apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-bootstrap
  namespace: argo-cd
  labels:
    argocd.argoproj.io/instance: platform-bootstrap
    env: dev
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  info:
    - name: 'Description: '
      value: 'This Application is used to bootstrap all applications in ArgoCD.'
    - name: 'Maintainers: '
      value: 'YKim'
  revisionHistoryLimit: 2
  destination:
    namespace: argo-cd
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/nsalexamy/kargo-playground-infra.git
    targetRevision: HEAD
    path: 'dev/argo-config'
    directory:
      recurse: true
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: -1 # Unlimited
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
