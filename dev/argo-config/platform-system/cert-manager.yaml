apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argo-cd
  labels:
    argocd.argoproj.io/instance: cert-manager
    argocd.argoproj.io/group: cert-manager
    env: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-diff-preview/watch-pattern: |
      dev/cert-manager/argo-apps/[^/]+$
spec:
  project: platform-system
  sources:
    - repoURL: https://github.com/nsalexamy/kargo-playground-infra.git
      targetRevision: HEAD
      path: dev/cert-manager/argo-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

